# Shared proxy headers. Place at /etc/nginx/conf.d/snippets/proxy_params.conf.
# The Upgrade/Connection pair (with the map in nginx-globals.conf.example) lets
# the same location serve both plain HTTP and the /ws WebSocket channel.

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

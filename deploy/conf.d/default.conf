# Reverse-proxy block for cipher-agent.syamxm.com. Other sites' server blocks
# live alongside this one in the real default.conf on the server.
# CSP allows analytics.syamxm.com so the Umami script and its beacon work.

server {
    listen 80;
    server_name cipher-agent.syamxm.com;

    location / {
        proxy_pass http://cipher_agent:8067;
        include /etc/nginx/conf.d/snippets/proxy_params.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.syamxm.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://analytics.syamxm.com; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
